<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculadora {
            background: #222;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            font-size: 20px;
            text-align: right;
            border-radius: 10px;
            border: none;
            padding: 10px;
        }

        button {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .operador {
            background: orange;
        }

        .igual {
            background: green;
            color: white;
        }
    </style>
</head>
<body>

<div class="calculadora">
    <input type="text" id="pantalla" disabled>

    <div>
        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button class="operador" onclick="agregar('/')">/</button>
    </div>

    <div>
        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button class="operador" onclick="agregar('*')">*</button>
    </div>

    <div>
        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>
        <button class="operador" onclick="agregar('-')">-</button>
    </div>

    <div>
        <button onclick="agregar('0')">0</button>
        <button onclick="limpiar()">C</button>
        <button class="igual" onclick="calcular()">=</button>
        <button class="operador" onclick="agregar('+')">+</button>
    </div>
</div>

<script>
function agregar(valor) {
    document.getElementById("pantalla").value += valor;
}

function limpiar() {
    document.getElementById("pantalla").value = "";
}

function calcular() {
    let resultado = eval(document.getElementById("pantalla").value);
    document.getElementById("pantalla").value = resultado;
}
</script>

</body>
</html>
